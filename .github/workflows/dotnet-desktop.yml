# ===================== 全局配置 =====================
name: Build C# EXE (SCD+FDD) and Upload to GitHub Release

# 触发条件：自动（Tag推送）+ 手动（页面触发）
on:
  push:
    tags: ['[vV]*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: '指定要打包的版本Tag名称（如 v1.0.0、V2.1.0）'
        required: true
        default: 'v1.0.0'
        type: string

# ===================== 执行任务 =====================
jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      # 步骤1：拉取代码（手动触发时需拉取指定Tag的代码）
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 手动触发时，切换到指定Tag；自动触发时，用当前Tag
          ref: ${{ github.event.inputs.tag_name || github.ref_name }}

      # 步骤2：安装 .NET SDK
      - name: 2. 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x' # 必改：你的项目.NET版本

      # 步骤3：恢复依赖
      - name: 3. 恢复项目依赖（NuGet 包）
        run: dotnet restore

      # 步骤4：发布 SCD 版本（包含运行时）
      - name: 4. 发布 SCD 版本（包含运行时）
        run: |
          # 必改：替换为你的.csproj实际路径
          dotnet publish `
            src/PhotoCompress.App/PhotoCompress.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -o ./publish-scd

      # 步骤5：发布 FDD 版本（不包含运行时）
      - name: 5. 发布 FDD 版本（不包含运行时）
        run: |
          # 必改：和上面的.csproj路径保持一致
          dotnet publish `
            src/PhotoCompress.App/PhotoCompress.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -o ./publish-fdd

      # 步骤6：打包 ZIP（统一用GitHub表达式，避免PowerShell变量问题）
      - name: 6. 打包两个版本为 ZIP 文件
        run: |
          # 统一使用固定的Tag名称变量（GitHub表达式）
          $TAG = "${{ github.event.inputs.tag_name || github.ref_name }}"
          # 打包 SCD 版本
          Compress-Archive -Path ./publish-scd/* -DestinationPath "PhotoCompress_$TAG_win-x64_scd.zip"
          # 打包 FDD 版本
          Compress-Archive -Path ./publish-fdd/* -DestinationPath "PhotoCompress_$TAG_win-x64_fdd.zip"

      # 步骤7：上传 Release（权限已开启，文件名完全匹配）
      - name: 7. 上传 ZIP 包到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 明确指定Tag（手动/自动统一）
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          # 文件名和打包步骤完全一致（用引号避免路径解析问题）
          files: |
            ./PhotoCompress_${{ github.event.inputs.tag_name || github.ref_name }}_win-x64_scd.zip
            ./PhotoCompress_${{ github.event.inputs.tag_name || github.ref_name }}_win-x64_fdd.zip
          # 发布说明
          body: |
            📦 版本说明：
            - scd 版本：包含 .NET 运行时，Windows x64 双击即可运行（体积较大）
            - fdd 版本：不包含 .NET 运行时，需先安装 .NET 8.0 运行时（体积更小）
            📥 .NET 运行时下载：https://dotnet.microsoft.com/zh-cn/download/dotnet/8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
