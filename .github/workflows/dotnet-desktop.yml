# ===================== 全局配置 =====================
name: Build C# EXE (SCD+FDD) and Upload to GitHub Release
# 触发条件：自动（Tag推送）+ 手动（页面触发）
on:
  push:
    tags: ['[vV]*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: '指定要打包的版本Tag名称（如 v1.0.0、V2.1.0）'
        required: true
        default: 'v1.0.0'
        type: string
# ===================== 执行任务 =====================
jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      # 步骤1：拉取仓库代码（移除ref强制指定，避免Tag不存在导致拉取失败）
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 步骤2：安装 .NET SDK
      - name: 2. 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x' # 必改：你的项目.NET版本

      # 步骤3：恢复依赖
      - name: 3. 恢复项目依赖（NuGet 包）
        run: dotnet restore

      # 步骤4：发布 SCD 版本（包含运行时，改用绝对路径输出）
      - name: 4. 发布 SCD 版本（包含运行时）
        run: |
          # 必改：替换为你的.csproj实际路径
          dotnet publish `
            src/PhotoCompress.App/PhotoCompress.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -o ${{ github.workspace }}\publish-scd

      # 步骤5：发布 FDD 版本（不包含运行时，改用绝对路径输出）
      - name: 5. 发布 FDD 版本（不包含运行时）
        run: |
          # 必改：和上面的.csproj路径保持一致
          dotnet publish `
            src/PhotoCompress.App/PhotoCompress.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -o ${{ github.workspace }}\publish-fdd

      # 【新增调试步骤】确认发布文件是否生成，方便排查问题
      - name: 调试：查看发布目录文件
        run: |
          Write-Host "=== SCD 发布目录文件 ==="
          Get-ChildItem ${{ github.workspace }}\publish-scd
          Write-Host "=== FDD 发布目录文件 ==="
          Get-ChildItem ${{ github.workspace }}\publish-fdd

      # 步骤6：打包 ZIP（绝对路径，确保生成在工作区根目录）
      - name: 6. 打包两个版本为 ZIP 文件
        run: |
          # 统一获取Tag名称，确保和上传步骤完全一致
          $TAG = "${{ github.event.inputs.tag_name || github.ref_name }}"
          Write-Host "当前打包版本Tag：$TAG"
          
          # 打包 SCD 版本（绝对路径）
          Compress-Archive `
            -Path ${{ github.workspace }}\publish-scd\* `
            -DestinationPath ${{ github.workspace }}\PhotoCompress_$TAG_win-x64_scd.zip `
            -Force
          
          # 打包 FDD 版本（绝对路径）
          Compress-Archive `
            -Path ${{ github.workspace }}\publish-fdd\* `
            -DestinationPath ${{ github.workspace }}\PhotoCompress_$TAG_win-x64_fdd.zip `
            -Force

      # 【新增调试步骤】确认ZIP包是否生成
      - name: 调试：查看根目录ZIP文件
        run: |
          Write-Host "=== 工作区根目录ZIP文件 ==="
          Get-ChildItem ${{ github.workspace }} -Filter *.zip

      # 步骤7：上传 Release（通配符匹配，彻底解决文件名匹配问题）
      - name: 7. 上传 ZIP 包到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 明确指定Tag（手动/自动统一）
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          # 通配符匹配所有符合规则的ZIP包，只要生成了就能上传
          files: |
            ${{ github.workspace }}\*_scd.zip
            ${{ github.workspace }}\*_fdd.zip
          # 发布说明
          body: |
            📦 版本说明：
            - scd 版本：包含 .NET 运行时，Windows x64 双击即可运行（体积较大）
            - fdd 版本：不包含 .NET 运行时，需先安装 .NET 8.0 运行时（体积更小）
            📥 .NET 运行时下载：https://dotnet.microsoft.com/zh-cn/download/dotnet/8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}