# ===================== 全局配置 =====================
name: Build C# EXE (SCD+FDD) and Upload to GitHub Release
on:
  push:
    tags: ['[vV]*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: '指定要打包的版本Tag名称（如 v1.0.0、V2.1.0）'
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: 1. 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x' # 必改：你的.NET版本

      - name: 3. 恢复项目依赖
        run: dotnet restore

      - name: 4. 发布 SCD 版本（包含运行时）
        run: |
          dotnet publish `
            src/PhotoCompress.App/PhotoCompress.App.csproj ` # 必改：你的csproj路径
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -o ${{ github.workspace }}\publish-scd

      - name: 5. 发布 FDD 版本（不包含运行时）
        run: |
          dotnet publish `
            src/PhotoCompress.App/PhotoCompress.App.csproj ` # 必改：和上面一致
            --configuration Release `
            --runtime win-x64 `
            --self-contained false `
            -o ${{ github.workspace }}\publish-fdd

      # 调试：确认发布文件
      - name: 调试：查看发布目录文件
        run: |
          Write-Host "=== SCD 发布目录文件 ==="
          Get-ChildItem ${{ github.workspace }}\publish-scd
          Write-Host "=== FDD 发布目录文件 ==="
          Get-ChildItem ${{ github.workspace }}\publish-fdd

      # 核心修复：强制固定文件名拼接，避免变量解析异常
      - name: 6. 打包两个版本为 ZIP 文件
        run: |
          # 强制获取Tag并清理空格（解决变量拼接异常）
          $TAG = "${{ github.event.inputs.tag_name || github.ref_name }}".Trim()
          Write-Host "当前打包版本Tag：$TAG"
          
          # 手动拼接正确文件名（避免PowerShell解析陷阱）
          $SCD_ZIP = "PhotoCompress_${TAG}-win-x64_scd.zip"
          $FDD_ZIP = "PhotoCompress_${TAG}-win-x64_fdd.zip"
          
          # 打包（强制覆盖+明确文件名）
          Compress-Archive `
            -Path ${{ github.workspace }}\publish-scd\* `
            -DestinationPath "${{ github.workspace }}\$SCD_ZIP" `
            -Force
          Compress-Archive `
            -Path ${{ github.workspace }}\publish-fdd\* `
            -DestinationPath "${{ github.workspace }}\$FDD_ZIP" `
            -Force
          
          # 打印最终生成的文件名（方便核对）
          Write-Host "生成的SCD包：$SCD_ZIP"
          Write-Host "生成的FDD包：$FDD_ZIP"

      # 调试：确认ZIP文件
      - name: 调试：查看根目录ZIP文件
        run: |
          Write-Host "=== 工作区根目录ZIP文件 ==="
          Get-ChildItem ${{ github.workspace }} -Filter *.zip

      # 核心修复：上传步骤直接指定生成的文件名（100%匹配）
      - name: 7. 上传 ZIP 包到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          # 直接指定ZIP文件路径（用变量确保和打包步骤完全一致）
          files: |
            ${{ github.workspace }}\PhotoCompress_${{ github.event.inputs.tag_name || github.ref_name }}-win-x64_scd.zip
            ${{ github.workspace }}\PhotoCompress_${{ github.event.inputs.tag_name || github.ref_name }}-win-x64_fdd.zip
          body: |
            📦 版本说明：
            - scd 版本：包含 .NET 运行时，Windows x64 双击即可运行（体积较大）
            - fdd 版本：不包含 .NET 运行时，需先安装 .NET 8.0 运行时（体积更小）
            📥 .NET 运行时下载：https://dotnet.microsoft.com/zh-cn/download/dotnet/8.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}